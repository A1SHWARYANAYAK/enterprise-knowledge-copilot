<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

<title>
    Enterprise Knowledge Copilot
</title>

<link rel="preconnect"
    href="https://fonts.googleapis.com">

<link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

<link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {

    font-family: "Inter", sans-serif;

    background: #f5f7fb;

    color: #0f172a;

    min-height: 100vh;

    padding: 24px;
}

.container {

    max-width: 900px;

    margin: 0 auto;
}

.hero {

    text-align: center;

    margin-top: 80px;

    margin-bottom: 60px;
}

.hero h1 {

    font-size: 56px;

    font-weight: 800;

    letter-spacing: -2px;

    margin-bottom: 18px;
}

.hero p {

    color: #64748b;

    font-size: 18px;

    max-width: 600px;

    margin: 0 auto;
}

.card {

    background: white;

    border: 1px solid #e2e8f0;

    border-radius: 24px;

    padding: 32px;

    margin-bottom: 28px;

    box-shadow:
        0 12px 32px rgba(15,23,42,.08);
}

.upload-area {

    text-align: left;
}

.upload-area h3 {

    margin-bottom: 14px;
}

.upload-note {

    color: #64748b;

    margin-bottom: 20px;

    line-height: 1.6;
}

.upload-area input[type="file"] {

    display: block;

    margin-top: 20px;

    margin-bottom: 20px;
}

button {

    background: #4f46e5;

    color: white;

    border: none;

    border-radius: 12px;

    padding: 12px 24px;

    font-size: 15px;

    font-weight: 600;

    cursor: pointer;

    transition: .2s ease;
}

button:hover {

    background: #4338ca;
}

button:disabled {

    opacity: .7;

    cursor: not-allowed;
}

.success {

    margin-top: 20px;

    display: inline-block;

    background: #ecfdf5;

    color: #065f46;

    border: 1px solid #a7f3d0;

    padding: 12px 18px;

    border-radius: 12px;

    font-weight: 600;
}

.hidden {

    display: none;
}

.document-info {

    display: flex;

    justify-content: space-between;

    align-items: center;

    gap: 16px;

    flex-wrap: wrap;

    margin-bottom: 22px;
}

.document-label {

    color: #64748b;

    font-size: 13px;

    margin-bottom: 6px;
}

.document-name {

    font-weight: 700;

    color: #16a34a;

    font-size: 18px;
}

.question-title {

    font-size: 18px;

    font-weight: 600;

    margin-bottom: 16px;
}

textarea {

    width: 100%;

    min-height: 180px;

    border: 1px solid #cbd5e1;

    border-radius: 16px;

    padding: 22px;

    font-size: 16px;

    line-height: 1.6;

    resize: vertical;

    font-family: inherit;
}

textarea:focus {

    outline: none;

    border-color: #4f46e5;
}

.answer-card {

    background: #fafbff;

    border-left: 6px solid #4f46e5;

    border-radius: 24px;

    padding: 32px;

    max-height: 500px;

    overflow-y: auto;

    box-shadow:
        0 12px 32px rgba(15,23,42,.08);
}

.answer-card::-webkit-scrollbar {

    width: 8px;
}

.answer-card::-webkit-scrollbar-track {

    background: #e2e8f0;

    border-radius: 10px;
}

.answer-card::-webkit-scrollbar-thumb {

    background: #94a3b8;

    border-radius: 10px;
}

.answer-text {

    white-space: pre-wrap;

    line-height: 1.9;

    font-size: 17px;

    color: #1e293b;

    overflow-wrap: break-word;
}

.footer {

    text-align: center;

    margin-top: 50px;

    color: #94a3b8;

    font-size: 14px;

    padding-bottom: 30px;
}

@media (max-width: 768px) {

    .hero {

        margin-top: 40px;
    }

    .hero h1 {

        font-size: 36px;
    }

    .hero p {

        font-size: 16px;
    }

    .card,
    .answer-card {

        height: 350px;
        padding: 22px;
    }
}

</style>

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>
            Enterprise Knowledge Copilot
        </h1>

        <p>
            Upload a document and get answers instantly.
        </p>

    </div>

    <div
        id="uploadCard"
        class="card upload-area">

        <h3>
            📄 Upload a Document
        </h3>

        <p class="upload-note">
            Supports text-based PDFs <strong>only</strong>.
        </p>

        <input
            type="file"
            id="pdfFile"
            accept=".pdf">

        <button onclick="uploadPDF()">
            Upload Document
        </button>

        <div
            id="uploadStatus"
            class="success hidden">
        </div>

    </div>

    <div
        id="questionSection"
        class="card hidden">

        <div class="document-info">

            <div>

                <div class="document-label">
                    Loaded Document
                </div>

                <div
                    id="documentName"
                    class="document-name">
                </div>

            </div>

            <button onclick="replaceDocument()">
                Replace Document
            </button>

        </div>

        <div class="question-title">
            What would you like to know?
        </div>

        <textarea
            id="question"
            placeholder="Ask a question about the uploaded document..."></textarea>

        <br><br>

        <button
            id="askButton"
            onclick="askQuestion()">

            Ask
        </button>

    </div>

    <div
        id="answerSection"
        class="answer-card hidden">

        <h3>
            Answer
        </h3>

        <div
            id="answer"
            class="answer-text">
        </div>

    </div>

    <div class="footer">

        © 2026 Aishwarya Nayak

        <br>

        Enterprise Knowledge Copilot

    </div>

</div>

<script>

function replaceDocument() {

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });

    setTimeout(() => {
        location.reload();
    }, 500);
}

async function uploadPDF() {

    const file =
        document.getElementById(
            "pdfFile"
        ).files[0];

    if (!file) {

        alert(
            "Please select a PDF."
        );

        return;
    }

    const formData =
        new FormData();

    formData.append(
        "file",
        file
    );

    const response =
        await fetch(
            "/upload",
            {
                method: "POST",
                body: formData
            }
        );

    const data =
        await response.json();

    const uploadStatus =
        document.getElementById(
            "uploadStatus"
        );

    uploadStatus.classList.remove(
        "hidden"
    );

    uploadStatus.innerHTML =
        `✓ ${data.filename} loaded successfully`;

    document.getElementById(
        "documentName"
    ).innerHTML =
        data.filename;

    document.getElementById(
        "questionSection"
    ).classList.remove(
        "hidden"
    );

    document.getElementById(
        "questionSection"
    ).scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}

async function askQuestion() {

    const button =
        document.getElementById(
            "askButton"
        );

    const answerSection =
        document.getElementById(
            "answerSection"
        );

    const answer =
        document.getElementById(
            "answer"
        );

    button.disabled = true;

    button.innerText =
        "Generating answer...";

    answerSection.classList.remove(
        "hidden"
    );

    answer.textContent = "";

    answer.textContent =
        "⏳ Generating answer...";

    const question =
        document.getElementById(
            "question"
        ).value;

    const response =
        await fetch(
            "/ask",
            {
                method: "POST",

                headers: {
                    "Content-Type":
                        "application/json"
                },

                body: JSON.stringify(
                    {
                        question
                    }
                )
            }
        );

    const data =
        await response.json();

    button.disabled = false;

    button.innerText =
        "Ask";

    answer.textContent =
        data.answer;

    answerSection.scrollIntoView({
        behavior: "smooth",
        block: "start"
    });
}

</script>

</body>

</html>
